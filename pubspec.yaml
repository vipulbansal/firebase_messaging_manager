name: firebase_messaging_manager
description: "A production-safe Firebase Messaging lifecycle manager for Flutter with duplicate notification prevention, local notification orchestration, and clean callbacks."
version: 0.0.2
homepage: https://github.com/vipulbansal/firebase_messaging_manager
repository: https://github.com/vipulbansal/firebase_messaging_manager
issue_tracker: https://github.com/vipulbansal/firebase_messaging_manager/issues
topics:
  - firebase
  - notifications
  - fcm
  - flutter-plugin
  - lifecycle

environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

